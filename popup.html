<!DOCTYPE html>
<html>
<head>
  <title>SelectSpeak</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="popup-container">
    <div class="header">
      <h1>SelectSpeak</h1>
      <p class="subtitle">Read selected text with smart voice control</p>
    </div>

    <!-- New Voice Customization Settings -->
    <div class="settings-panel">
      <div class="setting-group">
        <label for="languageSelect">Language</label>
        <select id="languageSelect">
          <option value="auto">Auto-detect</option>
        </select>
      </div>
      
      <div class="setting-group">
        <label for="voiceSelect">Voice / Tier</label>
        <select id="voiceSelect">
          <option>wavenet</option>
        </select>
      </div>

      <div class="setting-group">
        <label for="genderSelect">Voice gender</label>
        <select id="genderSelect">
          <option value="MALE">Male</option>
          <option value="FEMALE">Female</option>
          <option value="NEUTRAL">Neutral</option>
        </select>
      </div>
      
    </div>

    <div class="bottom-panel">
      <button id="speakButton" class="primary-button">Speak Selected Text</button>
      <button id="stopButton" class="danger-button">Stop Reading</button>
      <p id="statusText">Select text on a webpage, then click Speak Selected Text.</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
