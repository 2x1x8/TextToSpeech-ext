<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Popup</title>
  <style>
    body {
      margin: 0;
      width: 250px;
      height: 150px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: #fff;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      background: #0078d4;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: #005ea6;
    }
  </style>
</head>
<body>
  <button id="actionBtn">Click Me</button>
  <button id="speak">speak</button>
  <p id = "displayer"></p>
  <script src = 'popup.js'> </script>
  
</body>
</html>
